# Nginx REVERSE PROXY config — when nginx is on a DIFFERENT machine
# This server proxies to the app server at 10.10.10.102
# Use this if nginx runs on a gateway/load-balancer, not on 10.10.10.102

upstream lgain_app {
    server 10.10.10.102:80;   # App server (nginx + backend on 10.10.10.102)
}

server {
    listen 80;
    listen [::]:80;
    server_name l-gain-v1.payl.to;

    location / {
        proxy_pass http://lgain_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
