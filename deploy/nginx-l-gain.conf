# Nginx config for L-Gain Lottery
# Domain: l-gain-v1.payl.to
# Backend: FastAPI/uvicorn on 127.0.0.1:8000
# Frontend: static files from Vite build

upstream lgain_backend {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    listen [::]:80;
    server_name l-gain-v1.payl.to;

    # Redirect HTTP to HTTPS (uncomment after SSL is set up)
    # return 301 https://$server_name$request_uri;
    # }

    # server {
    # listen 443 ssl http2;
    # listen [::]:443 ssl http2;
    # server_name l-gain-v1.payl.to;

    # SSL (Let's Encrypt - run: certbot --nginx -d l-gain-v1.payl.to)
    # ssl_certificate /etc/letsencrypt/live/l-gain-v1.payl.to/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/l-gain-v1.payl.to/privkey.pem;

    # Frontend static files (Vite build output)
    root /var/www/l-gain/frontend/dist;
    index index.html;

    # API proxy to FastAPI backend
    location /api {
        proxy_pass http://lgain_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # SPA fallback - serve index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
